<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ProNotes | HR Support</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        transition: background-color 0.2s ease, color 0.2s ease;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #f8fafc; /* fallback for light */
    }

    /* GLOBAL SCROLLBAR */
    ::-webkit-scrollbar {
        width: 8px;
        height: 6px;
    }
    ::-webkit-scrollbar-track {
        background: transparent;
    }
    ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
    }

    .app-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
    }

    /* ========== HEADER (single line) ========== */
    .header-one-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.96);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        backdrop-filter: blur(8px);
        padding: 0.4rem 1rem 0.4rem 1.5rem;
        gap: 1rem;
        min-height: 52px;
        transition: background 0.2s, border-color 0.2s;
        flex-wrap: nowrap;
    }

    body.dark .header-one-line {
        background: #0a0a0f;        /* deep blackish background — no white padding anywhere */
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: none;       /* clean solid dark surface */
    }

    /* left side container */
    .header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex: 1;
        min-width: 0;
        overflow-x: auto;
        scrollbar-width: thin;
    }

    .logo-area {
        display: flex;
        align-items: baseline;
        gap: 0.4rem;
        flex-shrink: 0;
    }

    .logo {
        font-weight: 700;
        font-size: 1.25rem;
        letter-spacing: -0.3px;
        background: linear-gradient(135deg, #818cf8, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .badge {
        font-size: 0.65rem;
        font-weight: 500;
        background: #eef2ff;
        color: #4f46e5;
        padding: 0.15rem 0.45rem;
        border-radius: 30px;
        white-space: nowrap;
    }

    body.dark .badge {
        background: #1f1f2c;
        color: #a5b4fc;
    }

    /* TABS SCROLL AREA */
    .tabs-scroll {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        overflow-x: auto;
        scrollbar-width: thin;
        flex: 1;
        min-width: 120px;
    }
    .tabs-scroll::-webkit-scrollbar {
        height: 3px;
    }

    .tab-item {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.9rem 0.4rem 1rem;
        font-size: 0.8rem;
        font-weight: 500;
        border-radius: 40px;
        cursor: pointer;
        background: transparent;
        color: #334155;
        transition: all 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
        border: 1px solid transparent;
    }

    body.dark .tab-item {
        color: #e2e8f0;
        background: transparent;
    }

    .tab-item.active {
        background: #4f46e5;
        color: white;
        box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
        border-color: rgba(255,255,255,0.1);
    }

    body.dark .tab-item.active {
        background: #6366f1;
        color: #ffffff;
    }

    .tab-title {
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .tab-close {
        background: rgba(0,0,0,0.06);
        border: none;
        font-size: 0.85rem;
        cursor: pointer;
        color: #5b6e8c;
        border-radius: 30px;
        width: 20px;
        height: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.1s;
        margin-left: 4px;
        font-weight: 600;
    }
    .tab-item.active .tab-close {
        background: rgba(255,255,255,0.2);
        color: #f1f5f9;
    }
    .tab-close:hover {
        background: #e2e8f0;
        color: #ef4444;
    }
    body.dark .tab-close {
        background: #1e1e2c;
        color: #94a3b8;
    }
    body.dark .tab-close:hover {
        background: #2d2d3a;
        color: #f87171;
    }
    .tab-item.active .tab-close:hover {
        background: rgba(255,80,80,0.3);
        color: #ffc5c5;
    }

    /* RIGHT SIDE ACTION BUTTONS */
    .header-right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-shrink: 0;
    }

    .tool-btn {
        background: transparent;
        border: none;
        padding: 0.4rem 0.9rem;
        font-size: 0.8rem;
        font-weight: 500;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        color: #1e293b;
        white-space: nowrap;
    }

    body.dark .tool-btn {
        color: #e2e8f0;
        background: transparent;
    }

    .tool-btn:hover {
        background: #f1f5f9;
    }

    body.dark .tool-btn:hover {
        background: #1f1f2a;
    }

    .primary-btn {
        background: #4f46e5;
        color: white !important;
    }
    .primary-btn:hover {
        background: #4338ca;
        transform: translateY(-1px);
    }

    .danger-btn {
        background: #ef4444;
        color: white !important;
    }
    .danger-btn:hover {
        background: #dc2626;
    }

    .divider {
        width: 1px;
        height: 26px;
        background: #e2e8f0;
        margin: 0 0.2rem;
    }

    body.dark .divider {
        background: #2c2c3a;
    }

    /* STATUS BAR — DARK THEME: pure dark background, no white */
    .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 1.5rem;
        font-size: 0.7rem;
        background: #f1f5f9;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        transition: background 0.2s, color 0.2s;
    }

    body.dark .status-bar {
        background: #050508;      /* near-black background — no white padding */
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        color: #a0aec0;
    }

    .stats {
        display: flex;
        gap: 1rem;
    }

    .stat-item {
        display: flex;
        gap: 0.3rem;
        align-items: baseline;
    }

    .stat-label {
        font-weight: 500;
        opacity: 0.7;
    }

    .stat-value {
        font-weight: 600;
        font-family: 'JetBrains Mono', monospace;
    }

    body.dark .stat-value,
    body.dark .stat-label {
        color: #cbd5e6;
    }

    /* EDITOR WRAPPER — NO EXTERNAL WHITE SPACES IN DARK MODE */
    .editor-wrapper {
        flex: 1;
        position: relative;
        padding: 1rem 1.5rem 1.5rem 1.5rem;
        background: inherit;
    }

    body.dark .editor-wrapper {
        background: #010104;    /* deepest black background for entire editor area */
    }

    textarea {
        width: 100%;
        height: 100%;
        padding: 1.2rem 1.5rem;
        font-size: 0.95rem;
        line-height: 1.6;
        border-radius: 22px;
        border: 1px solid transparent;
        outline: none;
        resize: none;
        font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
        font-weight: 450;
        transition: all 0.2s ease;
        background: #ffffff;
        color: #0f172a;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
    }

    /* DARK TEXTAREA — complete dark background, black surface, no white margins */
    body.dark textarea {
        background: #000000;      /* solid dark surface matching header */
        color: #eef2ff;
        border-color: #2a2a32;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    textarea:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    body.dark textarea:focus {
        border-color: #818cf8;
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25);
    }

    /* TOAST - LIGHT THEME (default) */
.toast-msg {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);

    background: rgba(30, 30, 40, 0.96);
    color: #f1f5f9;  

    padding: 0.5rem 1.2rem;
    border-radius: 40px;
    font-size: 0.8rem;
    font-weight: 500;

    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;

    pointer-events: none;
    z-index: 1000;

    backdrop-filter: blur(12px);
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
    border: 0.5px solid rgba(0,0,0,0.08);
}

/* DARK THEME */
body.dark .toast-msg {
    background:rgba(255, 255, 255, 0.9);  
    color: #0f172a;

    backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255,255,255,0.1);
}

/* SHOW ANIMATION */
.toast-msg.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body class="light">

<div class="app-container">
    <!-- SINGLE-LINE HEADER: tabs on left, actions on right — fully dark in dark mode -->
    <div class="header-one-line">
        <div class="header-left">
            <div class="logo-area">
                <span class="logo">ProNotes</span>
                <span class="badge">HR Support</span>
            </div>
            <div class="tabs-scroll" id="tabsContainer"></div>
        </div>
        <div class="header-right">
            <button class="tool-btn" id="newTabBtn" title="New empty note (⌘/Ctrl+N)">📄 New</button>
            <button class="tool-btn" id="loadDefaultBtn" title="Open new tab with load template (⌘/Ctrl+L)">💾 Load</button>
            <button class="tool-btn" id="copyBtn" title="Copy current note (⌘/Ctrl+C)">📋 Copy</button>
            <button class="tool-btn danger-btn" id="deleteCurrentBtn" title="Delete current tab ">🗑️ Delete</button>
            <div class="divider"></div>
            <button class="tool-btn primary-btn" id="toggleMode">🌙 Dark</button>
        </div>
    </div>

    <!-- status bar: dark background uniform -->
    <div class="status-bar">
        <div class="stats">
            <div class="stat-item"><span class="stat-label">Chars:</span> <span id="charCount" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">Words:</span> <span id="wordCount" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">Lines:</span> <span id="lineCount" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">Saved:</span> <span id="lastSaved" class="stat-value">—</span></div>
        </div>
        <div class="stats">
            <div class="stat-item"><span class="stat-label">⏎ autosave</span></div>
        </div>
    </div>

    <div class="editor-wrapper">
        <textarea id="notepad" placeholder="Write your notes here... each note auto-saves."></textarea>
    </div>
</div>

<div id="toastMsg" class="toast-msg">✨ Ready</div>

<script>
    (function() {
        // ---------- Data Model ----------
        let notes = [];
        let activeNoteId = null;
        let nextId = 1;
        
        const textarea = document.getElementById('notepad');
        const charSpan = document.getElementById('charCount');
        const wordSpan = document.getElementById('wordCount');
        const lineSpan = document.getElementById('lineCount');
        const lastSavedSpan = document.getElementById('lastSaved');
        const toggleBtn = document.getElementById('toggleMode');
        const newTabBtn = document.getElementById('newTabBtn');
        const copyBtn = document.getElementById('copyBtn');
        const loadDefaultBtn = document.getElementById('loadDefaultBtn');
        const deleteCurrentBtn = document.getElementById('deleteCurrentBtn');
        const tabsContainer = document.getElementById('tabsContainer');
        const body = document.body;
        const toastEl = document.getElementById('toastMsg');
        
        let autoSaveTimer = null;
        
        function showToast(message, duration = 1600) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            if (window.toastTimeout) clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, duration);
        }
        
        function getNextEmptyNoteTitle() {
            const existing = notes.filter(n => n.title && n.title.match(/^📄\s*\d+/));
            let maxNum = 0;
            existing.forEach(n => {
                const match = n.title.match(/📄\s*(\d+)/);
                if (match) maxNum = Math.max(maxNum, parseInt(match[1], 10));
            });
            return `📄 ${maxNum + 1}`;
        }
        
        function deriveTitleFromContent(content, currentTitle, noteId) {
            const trimmed = content.trim();
            if (trimmed === "") {
                const existingOthers = notes.filter(n => n.id !== noteId && n.title && n.title.startsWith('📄'));
                let maxNum = 0;
                existingOthers.forEach(n => {
                    const match = n.title.match(/📄\s*(\d+)/);
                    if (match) maxNum = Math.max(maxNum, parseInt(match[1], 10));
                });
                const newNum = maxNum + 1;
                return `📄 ${newNum}`;
            }
            const firstLine = trimmed.split(/\r?\n/)[0];
            let clean = firstLine.replace(/^#+/, '').trim();
            if (clean.length === 0) clean = firstLine.substring(0, 32);
            if (clean.length > 30) clean = clean.substring(0, 28) + '..';
            return clean || "Note";
        }
        
        function persistAll() {
            const store = {
                notes: notes.map(n => ({ id: n.id, title: n.title, content: n.content, lastUpdated: n.lastUpdated })),
                activeId: activeNoteId,
                nextId: nextId
            };
            localStorage.setItem('proNotes_oneline_tabs', JSON.stringify(store));
        }
        
        function updateStats() {
            const content = textarea.value;
            const charCount = content.length;
            const words = content.trim() === '' ? [] : content.trim().split(/\s+/);
            const wordCount = content.trim() === '' ? 0 : words.length;
            const lines = content.split(/\r?\n/);
            let lineCount = lines.length;
            if (content.length === 0) lineCount = 0;
            charSpan.textContent = charCount.toLocaleString();
            wordSpan.textContent = wordCount.toLocaleString();
            lineSpan.textContent = lineCount.toLocaleString();
        }
        
        function updateLastSavedUI() {
            const date = new Date();
            const formatted = date.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
            lastSavedSpan.textContent = formatted;
        }
        
        function saveCurrentNote() {
            if (!activeNoteId) return;
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx !== -1) {
                const newContent = textarea.value;
                notes[idx].content = newContent;
                notes[idx].lastUpdated = Date.now();
                const newTitle = deriveTitleFromContent(newContent, notes[idx].title, activeNoteId);
                notes[idx].title = newTitle;
                persistAll();
                renderTabs();
                updateLastSavedUI();
            }
        }
        
        function scheduleAutoSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                saveCurrentNote();
            }, 700);
        }
        
        function loadNoteIntoEditor(noteId) {
            const note = notes.find(n => n.id === noteId);
            if (!note) return;
            activeNoteId = note.id;
            textarea.value = note.content;
            updateStats();
            updateLastSavedUI();
            renderTabs();
            textarea.focus();
        }
        
        function createEmptyNote() {
            const newId = nextId++;
            const newTitle = getNextEmptyNoteTitle();
            const newNote = {
                id: newId,
                title: newTitle,
                content: "",
                lastUpdated: Date.now()
            };
            notes.push(newNote);
            activeNoteId = newId;
            textarea.value = "";
            updateStats();
            saveCurrentNote();
            renderTabs();
            showToast(`✨ New "${newTitle}" created`, 1300);
            textarea.focus();
        }
        
        function createLoadMessageTab() {
            const loadMessage = `Username: 
Issue: _____, it's urgent, please process this ASAP, pending form _____
Called Number: 
Branch Name: `;
            
            const newId = nextId++;
            const firstLineRaw = loadMessage.split(/\r?\n/)[0].replace(/^#+/, '').trim();
            const derivedTitle = firstLineRaw.length > 28 ? firstLineRaw.substring(0, 26)+'..' : (firstLineRaw || "Load Message");
            const newNote = {
                id: newId,
                title: derivedTitle,
                content: loadMessage,
                lastUpdated: Date.now()
            };
            notes.push(newNote);
            activeNoteId = newId;
            textarea.value = loadMessage;
            updateStats();
            saveCurrentNote();
            renderTabs();
            showToast(`💾 Loaded urgent template`, 1800);
            textarea.focus();
        }
        
        function deleteCurrentTab() {
            if (!activeNoteId) return;
            if (notes.length === 1) {
                const confirmDel = confirm("Last note. Delete and create a fresh empty note?");
                if (!confirmDel) return;
                notes = [];
                const freshId = nextId++;
                const freshNote = {
                    id: freshId,
                    title: "📄 1",
                    content: "",
                    lastUpdated: Date.now()
                };
                notes.push(freshNote);
                activeNoteId = freshId;
                textarea.value = "";
                updateStats();
                persistAll();
                renderTabs();
                showToast("Last tab replaced", 1400);
                return;
            }
            const current = notes.find(n => n.id === activeNoteId);
            if (!current) return;
            const confirmDel = confirm(`Delete tab "${current.title}"?`);
            if (!confirmDel) return;
            const idx = notes.findIndex(n => n.id === activeNoteId);
            if (idx !== -1) {
                notes.splice(idx, 1);
                if (notes.length > 0) {
                    activeNoteId = notes[0].id;
                    loadNoteIntoEditor(activeNoteId);
                } else {
                    const fallbackId = nextId++;
                    const fallback = { id: fallbackId, title: "📄 New", content: "", lastUpdated: Date.now() };
                    notes.push(fallback);
                    activeNoteId = fallback.id;
                    textarea.value = "";
                    updateStats();
                }
                persistAll();
                renderTabs();
                showToast(`🗑️ Deleted "${current.title}"`, 1300);
            }
        }
        
        async function copyCurrentNote() {
            if (!activeNoteId) return;
            try {
                await navigator.clipboard.writeText(textarea.value);
                showToast("📋 Copied ", 1200);
            } catch(e) {
                textarea.select();
                document.execCommand('copy');
                showToast("Copied (fallback)", 1200);
                textarea.blur();
            }
        }
        
        function renderTabs() {
            if (!tabsContainer) return;
            tabsContainer.innerHTML = '';
            notes.forEach(note => {
                const tabDiv = document.createElement('div');
                tabDiv.className = 'tab-item';
                if (activeNoteId === note.id) tabDiv.classList.add('active');
                const titleSpan = document.createElement('span');
                titleSpan.className = 'tab-title';
                let displayTitle = note.title || 'Untitled';
                if (displayTitle.length > 28) displayTitle = displayTitle.slice(0, 26) + '..';
                titleSpan.textContent = displayTitle;
                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close';
                closeBtn.innerHTML = '✕';
                closeBtn.title = 'Close tab';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (notes.length === 1) {
                        showToast("Cannot close last tab; use Delete button", 1400);
                        return;
                    }
                    const confirmDel = confirm(`Close "${note.title}"?`);
                    if (!confirmDel) return;
                    const wasActive = (activeNoteId === note.id);
                    notes = notes.filter(n => n.id !== note.id);
                    if (wasActive && notes.length > 0) {
                        activeNoteId = notes[0].id;
                        loadNoteIntoEditor(activeNoteId);
                    } else if (notes.length === 0) {
                        const freshId = nextId++;
                        const fresh = { id: freshId, title: "📄 1", content: "", lastUpdated: Date.now() };
                        notes.push(fresh);
                        activeNoteId = fresh.id;
                        textarea.value = "";
                        updateStats();
                    }
                    persistAll();
                    renderTabs();
                    if (activeNoteId) loadNoteIntoEditor(activeNoteId);
                    showToast("Tab closed", 1000);
                });
                tabDiv.appendChild(titleSpan);
                tabDiv.appendChild(closeBtn);
                tabDiv.addEventListener('click', () => {
                    if (activeNoteId === note.id) return;
                    saveCurrentNote();
                    loadNoteIntoEditor(note.id);
                });
                tabsContainer.appendChild(tabDiv);
            });
            if (tabsContainer.scrollTo) {
                const activeTab = tabsContainer.querySelector('.tab-item.active');
                if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }
        
        function initTheme() {
            const stored = localStorage.getItem('proNotes_theme');
            if (stored === 'dark') {
                body.classList.add('dark');
                body.classList.remove('light');
                toggleBtn.innerHTML = '☀️ Light';
            } else {
                body.classList.add('light');
                body.classList.remove('dark');
                toggleBtn.innerHTML = '🌙 Dark';
            }
        }
        
        function toggleTheme() {
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('proNotes_theme', 'dark');
                toggleBtn.innerHTML = '☀️ Light';
                showToast('Dark mode', 1000);
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('proNotes_theme', 'light');
                toggleBtn.innerHTML = '🌙 Dark';
                showToast('Light mode', 900);
            }
        }
        
        function loadInitial() {
            const stored = localStorage.getItem('proNotes_oneline_tabs');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data.notes && Array.isArray(data.notes) && data.notes.length > 0) {
                        notes = data.notes;
                        activeNoteId = data.activeId;
                        nextId = data.nextId || (Math.max(...notes.map(n=>n.id), 0) + 1);
                        if (!notes.some(n => n.id === activeNoteId)) activeNoteId = notes[0].id;
                        loadNoteIntoEditor(activeNoteId);
                        renderTabs();
                        return;
                    }
                } catch(e) {}
            }
            const defaultId = nextId++;
            const defaultNote = {
                id: defaultId,
                title: "📄 1",
                content: "",
                lastUpdated: Date.now()
            };
            notes = [defaultNote];
            activeNoteId = defaultId;
            textarea.value = "";
            updateStats();
            persistAll();
            renderTabs();
        }
        
        function handleKeys(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveCurrentNote();
                showToast("✓ Saved", 900);
                return;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                createEmptyNote();
                return;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                e.preventDefault();
                createLoadMessageTab();
                return;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                deleteCurrentTab();
                return;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'd' && !e.shiftKey) {
                e.preventDefault();
                toggleTheme();
                return;
            }
        }
        
        function bindEvents() {
            textarea.addEventListener('input', () => {
                updateStats();
                scheduleAutoSave();
            });
            textarea.addEventListener('keyup', updateStats);
            textarea.addEventListener('click', updateStats);
            textarea.addEventListener('paste', () => {
                setTimeout(() => {
                    updateStats();
                    scheduleAutoSave();
                }, 10);
            });
            newTabBtn.addEventListener('click', createEmptyNote);
            loadDefaultBtn.addEventListener('click', createLoadMessageTab);
            copyBtn.addEventListener('click', copyCurrentNote);
            deleteCurrentBtn.addEventListener('click', deleteCurrentTab);
            toggleBtn.addEventListener('click', toggleTheme);
            document.addEventListener('keydown', handleKeys);
            window.addEventListener('beforeunload', () => {
                saveCurrentNote();
                persistAll();
            });
            setInterval(() => {
                if (activeNoteId) saveCurrentNote();
            }, 30000);
        }
        
        function init() {
            initTheme();
            loadInitial();
            bindEvents();
            textarea.focus();
        }
        
        init();
    })();
</script>
</body>
</html>
