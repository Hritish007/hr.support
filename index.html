<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Support</title>
  <link rel="icon" href="welcome.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: rgb(44, 44, 44);
      --shadow-light: rgba(20, 18, 18, 0.788);
      --shadow-dark: rgba(20, 18, 18, 0.788);
      --primary: rgb(44, 44, 44)
;
      --accent: #4a90e2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--primary);
    }
.hero-line{
  color: white;
}
    .card {
      background: var(--bg);
      box-shadow: 8px 8px 16px var(--shadow-dark),
                  -8px -8px 16px var(--shadow-light);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 500px;
      width: 90%;
      animation: fadeIn 1s ease;
    }

    .card h1 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .card p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #555;
    }

    .start-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.1);
      transition: background 0.3s ease;
    }

    .start-btn:hover {
      background: #357bd8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: absolute;
      bottom: 20px;
      text-align: center;
      width: 100%;
      font-size: 0.85rem;
      color: #888;
    }

    @media (max-width: 500px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .card h1 {
        font-size: 1.8rem;
      }

      .card p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome to HR Support</h1>
    <p id="hero-line"></p>
    <button class="start-btn" onclick="location.href='router.html'">Get Started</button><br>
  </div>
  

  <footer>&copy; <span id="year"></span> HritishShaqya. All rights reserved.</footer>

  <script>
    // Hero Line Message
    const lines = [
      "Time, tasks, and support — it’s all in your hands.",
      "Success starts with how you manage time, tasks, and support.",
      "You own the clock, the checklist, and the challenge.",
      "Manage time, handle tasks, support smart — it’s up to you.",
      "Time and tasks don’t wait — neither should you.",
      "It’s not just work — it’s how you work that counts.",
      "Balance time, conquer tasks, lead with support.",
      "The way you manage defines the way you succeed.",
      "Time is limited, but your impact doesn’t have to be.",
      "Own your time, master your tasks, support your team.",
      "Your time, your tasks, your team — your success.",
      "You don’t need more hours — just better focus.",
      "Behind every goal is a task well-managed.",
      "Work smart. Lead strong. Finish well.",
    ];const display = document.getElementById("hero-line");
    let currentIndex = parseInt(localStorage.getItem("heroLineIndex")) || 0;
    display.textContent = lines[currentIndex];
    localStorage.setItem("heroLineIndex", (currentIndex + 1) % lines.length);


  </script>
 
</body>
</html>
