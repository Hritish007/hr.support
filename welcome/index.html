<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome Back</title>
  <link rel="icon" href="img/welcom.jpg" />
  <style>
    :root{
      --bg:#06060a;
      --card:#0e1117;
      --muted:#a9b0bf;
      --accent:#6ee7b7;
      --accent-2:#3b82f6;
      --glass-border: rgba(255,255,255,0.06);
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
      --radius: 14px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(84,180,255,0.06), transparent),
                  radial-gradient(1000px 500px at 90% 90%, rgba(110,231,183,0.03), transparent),
                  var(--bg);
      color:#e6eef6;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
      position:relative;
    }

    #particles-overlay{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    .card{
      z-index:2;
      width:min(600px,95%);
      background: rgba(255,255,255,0.03);
      border-radius:var(--radius);
      padding:36px;
      border:1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      text-align:center;
      box-shadow:var(--shadow);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(22px,4vw,34px);
    }

    #hero-line{
      color:var(--muted);
      min-height:1.4em;
      margin-bottom:20px;
    }

    #timer{
      color:var(--accent);
      margin-top:15px;
    }

    .start-btn{
      margin-top:15px;
      padding:12px 18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      background: linear-gradient(90deg,var(--accent),var(--accent-2));
    }

    footer{
      position:fixed;
      bottom:15px;
      width:100%;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      z-index:2;
    }
  </style>
</head>

<body>

<div id="particles-overlay"></div>

<div class="card">
  <h1>Welcome to HR Support</h1>
  <p id="hero-line"></p>

  <div id="timer">00:00</div>

  <button class="start-btn"
    onclick="window.location.href='https://hritish007.github.io/hr.support/'">
    Get Started
  </button>
</div>

<footer>&copy; <span id="year"></span> HritishShaqya. Keep learning and Enjoying.</footer>

<script>
const lines = [
  "Time, tasks, and support — it's all in your hands.",
  "Success starts with how you manage time.",
  "You own the clock, the checklist, and the challenge.",
  "Work smart. Lead strong. Finish well."
];

let i=0,j=0,typing=true;
const display=document.getElementById("hero-line");

function type(){
  if(typing){
    if(j<lines[i].length){
      display.textContent+=lines[i][j++];
      setTimeout(type,50);
    }else{
      typing=false;
      setTimeout(type,1500);
    }
  }else{
    display.textContent="";
    j=0;
    i=(i+1)%lines.length;
    typing=true;
    setTimeout(type,300);
  }
}
type();

const timer=document.getElementById("timer");
const start=Date.now();

setInterval(()=>{
  let s=Math.floor((Date.now()-start)/1000);
  let m=Math.floor(s/60);
  s%=60;
  timer.textContent=
    String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
},1000);

document.getElementById("year").textContent=new Date().getFullYear();

const container=document.getElementById("particles-overlay");
const canvas=document.createElement("canvas");
container.appendChild(canvas);
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const mouse={x:null,y:null,r:120};
addEventListener("mousemove",e=>{
  mouse.x=e.x;
  mouse.y=e.y;
});

const particles=[];
const count=110;

class P{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=Math.random()*canvas.height;
    this.s=Math.random()*2+1;
    this.vx=(Math.random()-0.5)*0.7;
    this.vy=(Math.random()-0.5)*0.7;
    this.o=Math.random()*0.5+0.2;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;

    if(mouse.x){
      let dx=this.x-mouse.x;
      let dy=this.y-mouse.y;
      let d=Math.sqrt(dx*dx+dy*dy);
      if(d<mouse.r){
        this.x+=dx/30;
        this.y+=dy/30;
      }
    }

    if(this.x<0||this.x>canvas.width||
       this.y<0||this.y>canvas.height) this.reset();
  }
  draw(){
    ctx.beginPath();
    ctx.fillStyle=`rgba(84,180,255,${this.o})`;
    ctx.shadowBlur=12;
    ctx.shadowColor="#54b4ff";
    ctx.arc(this.x,this.y,this.s,0,Math.PI*2);
    ctx.fill();
  }
}

for(let k=0;k<count;k++) particles.push(new P());

function connect(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx=particles[a].x-particles[b].x;
      let dy=particles[a].y-particles[b].y;
      let d=dx*dx+dy*dy;

      if(d<12000){
        ctx.beginPath();
        ctx.strokeStyle=`rgba(110,231,183,${1-d/12000})`;
        ctx.moveTo(particles[a].x,particles[a].y);
        ctx.lineTo(particles[b].x,particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  connect();
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
